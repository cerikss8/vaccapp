{% extends "base.html" %}
{% block title %}Logga in{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">

        <div class="card shadow-lg border-0 rounded-4 p-4">

            <div class="text-center mb-4">
                <h3 class="fw-bold">🔐 Välkommen tillbaka</h3>
                <p class="text-muted">
                    Logga in för att hantera dina vaccinationer.
                </p>
            </div>

            <form method="post">

                <input type="hidden"
                       name="csrf_token"
                       value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label class="form-label">E-postadress</label>
                    <input type="email"
                           name="email"
                           class="form-control form-control-lg"
                           placeholder="namn@email.se"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Lösenord</label>
                    <input type="password"
                           name="password"
                           class="form-control form-control-lg"
                           placeholder="Ditt lösenord"
                           required>
                </div>

                <div class="d-grid">
                    <button type="submit"
                            class="btn btn-primary btn-lg rounded-3">
                        Logga in
                    </button>
                </div>

            </form>

            <div class="text-center mt-4">

                <a href="{{ url_for('auth.forgot_password') }}"
                   class="text-decoration-none">
                    Glömt lösenord?
                </a>

                <div class="mt-2">
                    <span class="text-muted">Har du inget konto?</span>
                    <a href="{{ url_for('auth.register') }}"
                       class="text-decoration-none fw-semibold">
                        Registrera dig
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
