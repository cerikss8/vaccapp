{% extends "base.html" %}
{% block title %}Nytt lösenord{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">

        <div class="card shadow-lg border-0 rounded-4 p-4">

            <div class="text-center mb-4">
                <h3 class="fw-bold">🔒 Ange nytt lösenord</h3>
                <p class="text-muted">
                    Skapa ett nytt säkert lösenord för ditt konto.
                </p>
            </div>

            <form method="post">

                <input type="hidden"
                       name="csrf_token"
                       value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label class="form-label">Nytt lösenord</label>
                    <input type="password"
                           name="password"
                           class="form-control form-control-lg"
                           placeholder="Minst 8 tecken"
                           required>
                </div>

                <div class="d-grid">
                    <button type="submit"
                            class="btn btn-success btn-lg rounded-3">
                        Uppdatera lösenord
                    </button>
                </div>

            </form>

        </div>

    </div>
</div>

{% endblock %}
