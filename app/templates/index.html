{% extends "base.html" %}
{% block title %}VaccApp{% endblock %}

{% block content %}
<div class="text-center mt-5">
    <img src="{{ url_for('static', filename='img/logo.png') }}"
         alt="VaccApp Logga"
         class="img-fluid mb-4"
         style="max-width: 250px;">
    <h1>VaccApp</h1>
    <p class="lead">Hantera dina vaccinationer enkelt och säkert.</p>
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg mt-3">
        Logga in
    </a>
    <a href="{{ url_for('auth.register') }}" class="btn btn-outline-secondary btn-lg mt-3">
        Registrera
    </a>
</div>
{% endblock %}
