{% extends "base.html" %}
{% block title %}Redigera profil{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-7 col-lg-6">

        <div class="card shadow-lg border-0 rounded-4 p-4">

            <div class="text-center mb-4">
                <h3 class="fw-bold">✏️ Redigera profil</h3>
                <p class="text-muted mb-0">
                    Uppdatera dina uppgifter. Dessa används även i ditt vaccinationsintyg.
                </p>
            </div>

            <form method="post">
                <input type="hidden"
                       name="csrf_token"
                       value="{{ csrf_token() }}">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Förnamn</label>
                        <input type="text"
                               name="first_name"
                               class="form-control form-control-lg"
                               value="{{ current_user.first_name or '' }}"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Efternamn</label>
                        <input type="text"
                               name="last_name"
                               class="form-control form-control-lg"
                               value="{{ current_user.last_name or '' }}"
                               required>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Telefonnummer</label>
                        <input type="text"
                               name="phone"
                               class="form-control form-control-lg"
                               value="{{ current_user.phone or '' }}"
                               placeholder="+46 70 123 45 67">
                    </div>

                    <div class="col-12">
                        <label class="form-label">E-postadress</label>
                        <input type="email"
                               class="form-control form-control-lg"
                               value="{{ current_user.email }}"
                               disabled>
                        <div class="form-text">
                            E-post kan inte ändras här.
                        </div>
                    </div>

                </div>

                <div class="d-grid mt-4">
                    <button type="submit"
                            class="btn btn-primary btn-lg rounded-3">
                        Spara ändringar
                    </button>
                </div>

            </form>

            <div class="text-center mt-4">
                <a href="{{ url_for('main.profile') }}"
                   class="text-decoration-none">
                    ← Tillbaka till profil
                </a>
            </div>

        </div>

    </div>
</div>

{% endblock %}
