{% extends "base.html" %}
{% block title %}Registrera{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">

        <div class="card shadow-lg border-0 rounded-4 p-4">

            <div class="text-center mb-4">
                <h3 class="fw-bold">🧾 Skapa konto</h3>
                <p class="text-muted">
                    Registrera dig för att börja hantera dina vaccinationer.
                </p>
            </div>

            <form method="post">

                <input type="hidden"
                       name="csrf_token"
                       value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label class="form-label">Förnamn</label>
                    <input type="text"
                           name="first_name"
                           class="form-control form-control-lg"
                           placeholder="Förnamn"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Efternamn</label>
                    <input type="text"
                           name="last_name"
                           class="form-control form-control-lg"
                           placeholder="Efternamn"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Telefonnummer</label>
                    <input type="text"
                           name="phone"
                           class="form-control form-control-lg"
                           placeholder="+46 70 123 45 67"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">E-postadress</label>
                    <input type="email"
                           name="email"
                           class="form-control form-control-lg"
                           placeholder="namn@email.se"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Lösenord</label>
                    <input type="password"
                           name="password"
                           class="form-control form-control-lg"
                           placeholder="Minst 8 tecken"
                           required>
                </div>

                <div class="d-grid">
                    <button type="submit"
                            class="btn btn-success btn-lg rounded-3">
                        Skapa konto
                    </button>
                </div>

            </form>

            <div class="text-center mt-4">
                <span class="text-muted">Har du redan ett konto?</span>
                <a href="{{ url_for('auth.login') }}"
                   class="text-decoration-none fw-semibold">
                    Logga in
                </a>
            </div>

        </div>

    </div>
</div>

{% endblock %}
